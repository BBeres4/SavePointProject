<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Games • SavePoint</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  {% set active='games' %}
  {% include "partials_nav.html" %}

  <div class="page">

    <!-- SEARCH PANEL -->
    <section class="games-search-panel">

      <div class="games-search-header">
        <div>
          <p class="section-kicker">Explore the library</p>
          <h1 class="page-title">Games</h1>
        </div>

        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input id="searchInput" class="search" placeholder="Search any game..." />
        </div>

      </div>

      <div class="filters">
        <select disabled><option>Year</option></select>
        <select disabled><option>Genre</option></select>
        <select disabled><option>Rating</option></select>
        <select disabled><option>Platform</option></select>
      </div>

    </section>


    <!-- POPULAR -->
    <section class="section">

      <div class="section-head">
        <div>
          <p class="section-kicker">Trending now</p>
          <h2>Popular This Week</h2>
        </div>
      </div>

      <div id="popularGrid" class="grid games-grid"></div>

    </section>


    <!-- SEARCH RESULTS -->
    <section class="section">

      <div class="section-head">
        <div>
          <p class="section-kicker">Live search</p>
          <h2>Search Results</h2>
        </div>
      </div>

      <div id="searchGrid" class="grid games-grid search-results-grid"></div>

    </section>


  </div>

  <script src="/static/app.js"></script>

  <script>
    loadGamesPage();
  </script>

</body>
</html>
